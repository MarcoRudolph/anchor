name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    name: Lint → Typecheck → i18n → Vitest → Playwright → LHCI
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Point Playwright at the running preview server (set per-step below)
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      # Ephemeral Supabase (booted in the playwright step below)
      SUPABASE_URL: http://localhost:54321

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ──────────────────────────────────────────────────────────────────────
      # Gate 1: Lint
      # ──────────────────────────────────────────────────────────────────────
      - name: Lint
        run: pnpm lint

      # ──────────────────────────────────────────────────────────────────────
      # Gate 2: Typecheck
      # ──────────────────────────────────────────────────────────────────────
      - name: Typecheck
        run: pnpm typecheck

      # ──────────────────────────────────────────────────────────────────────
      # Gate 3: i18n key-parity (DEC-0012 / T-00-12)
      # FAILS the build on any DE↔EN key drift — no silent missing translations.
      # ──────────────────────────────────────────────────────────────────────
      - name: i18n key-parity check
        run: pnpm i18n:check

      # ──────────────────────────────────────────────────────────────────────
      # Gate 4: Vitest unit + integration tests
      # Uses vitest run (non-watch) — T-00-13 (no hanging watch mode in CI)
      # ──────────────────────────────────────────────────────────────────────
      - name: Vitest
        run: pnpm test:run

      # ──────────────────────────────────────────────────────────────────────
      # Gate 5: Playwright E2E (UJ-002 pairing journey merge gate)
      # Boots the ephemeral Supabase stack before running E2E tests.
      # T-00-11: no prod secrets — CI uses ephemeral local Supabase + stub bot.
      # ──────────────────────────────────────────────────────────────────────
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start ephemeral Supabase
        run: supabase start
        # Exports SUPABASE_ANON_KEY and SUPABASE_SERVICE_ROLE_KEY into the env
        # for downstream steps via supabase status --output env

      - name: Export Supabase keys
        run: |
          eval "$(supabase status --output env 2>/dev/null || true)"
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY" >> $GITHUB_ENV
          echo "SUPABASE_URL=$SUPABASE_URL" >> $GITHUB_ENV

      - name: Build Next.js for Playwright
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}

      - name: Start Next.js server for Playwright
        run: pnpm start &
        env:
          PORT: 3000
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}

      - name: Wait for Next.js server
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Playwright E2E tests
        run: pnpm exec playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          SUPABASE_URL: ${{ env.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          HERMES_SECRET: ${{ secrets.HERMES_SECRET }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      # ──────────────────────────────────────────────────────────────────────
      # Gate 6: Lighthouse CI — ADR-0020 performance budgets
      # Runs against the live Next.js server (same process as Playwright step).
      # LCP <2.0s, CLS <0.1, first-load JS <90KB landing — enforced from the
      # empty shell so features cannot silently blow the budgets (Pitfall 7).
      # A10: In future phases, LHCI will target the Vercel preview URL instead.
      # ──────────────────────────────────────────────────────────────────────
      - name: Lighthouse CI
        run: pnpm exec lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
